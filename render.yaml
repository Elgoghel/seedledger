services:
  - type: web
    name: seedledger
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn seedledger_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_KEY
        generateValue: true
      - key: INQUIRY_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: SITE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: seedledger-db
          property: connectionURI

databases:
  - name: seedledger-db
    plan: free
